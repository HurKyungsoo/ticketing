spring:
  application:
    name: ticketing
  profiles:
    active: local

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
        default_batch_fetch_size: 100
    open-in-view: false

  thymeleaf:
    cache: false

mybatis:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true

# 공공데이터포털 인증키 (활용신청 후 발급) - 절대 커밋하지 말 것
publicdata:
  service-key: ${PUBLICDATA_SERVICE_KEY:REPLACE_ME}
  # 전국공연행사정보표준데이터 (객석수/요금/좌표 포함)
  performance-url: http://api.data.go.kr/openapi/tn_pubr_public_show_performance_api
  # 한눈에보는문화정보 (썸네일/장르/상세 포함)
  culture-url: http://api.kcisa.kr/openapi/API_CIA_090/request
  sync-page-size: 100
  sync-max-pages: 5

---
spring:
  config:
    activate:
      on-profile: local
  datasource:
    url: jdbc:h2:mem:ticket;MODE=MySQL;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console

---
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: jdbc:mariadb://localhost:3306/ticket?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    driver-class-name: org.mariadb.jdbc.Driver
    username: ${DB_USER}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
