<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>결제 실패</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div class="wrap authwrap">
    <header class="masthead">
        <h1><a th:href="@{/}">객석</a></h1>
        <span class="tag">결제 실패</span>
    </header>

    <div class="empty-state" style="text-align:left;padding:0">
        <p><strong style="color:var(--rose)">결제에 실패했습니다.</strong></p>
        <p th:if="${code}">오류 코드: <span th:text="${code}">CODE</span></p>
        <p th:if="${message}" th:text="${message}">사유</p>
    </div>

    <p style="margin-top:24px"><a th:href="@{/}" style="color:var(--brass)">공연 목록으로</a></p>
</div>
</body>
</html>
