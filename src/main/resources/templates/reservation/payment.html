<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>결제하기</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
    <script src="https://js.tosspayments.com/v2/standard"></script>
</head>
<body>
<div class="wrap authwrap">
    <header class="masthead">
        <h1><a th:href="@{/}">객석</a></h1>
        <span class="tag">결제</span>
    </header>

    <p class="picked" style="margin-bottom:24px">
        <strong th:text="${orderName}">주문명</strong> ·
        <span th:text="${#numbers.formatInteger(reservation.amount,0,'COMMA')} + '원'">금액</span>
    </p>

    <button type="button" id="payBtn" class="authform">카드로 결제하기</button>
</div>

<script th:inline="javascript">
    const clientKey = /*[[${tossClientKey}]]*/ 'test_ck_00000000000000000000';
    const reservationNo = /*[[${reservation.reservationNo}]]*/ '';
    const orderName = /*[[${orderName}]]*/ '';
    const amount = /*[[${reservation.amount}]]*/ 0;

    const tossPayments = TossPayments(clientKey);
    const payment = tossPayments.payment({ customerKey: "ANONYMOUS" });

    document.getElementById('payBtn').addEventListener('click', async () => {
        try {
            await payment.requestPayment({
                method: "CARD",
                amount: { currency: "KRW", value: amount },
                orderId: reservationNo,
                orderName: orderName,
                successUrl: `${window.location.origin}/reservations/${reservationNo}/payment/success`,
                failUrl: `${window.location.origin}/reservations/${reservationNo}/payment/fail`,
                card: { useEscrow: false },
            });
        } catch (e) {
            alert('결제 요청 중 오류가 발생했습니다: ' + (e.message || e));
        }
    });
</script>
</body>
</html>
