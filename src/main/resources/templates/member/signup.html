<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>회원가입</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div class="wrap authwrap">
    <header class="masthead">
        <h1><a th:href="@{/}">객석</a></h1>
        <span class="tag">회원가입</span>
    </header>

    <form class="authform" th:action="@{/signup}" method="post">
        <p class="autherror" th:if="${error}" th:text="${error}">에러</p>

        <label>
            아이디
            <input type="text" name="loginId" required autofocus>
        </label>
        <label>
            비밀번호
            <input type="password" name="password" required>
        </label>
        <label>
            닉네임
            <input type="text" name="nickname" required>
        </label>

        <button type="submit">가입하기</button>
        <p class="authlink"><a th:href="@{/login}">이미 계정이 있으신가요? 로그인</a></p>
    </form>
</div>
</body>
</html>
